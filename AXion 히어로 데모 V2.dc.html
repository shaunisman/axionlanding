<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  @keyframes axhPls{0%{box-shadow:0 0 0 0 rgba(55,177,121,.5)}70%{box-shadow:0 0 0 7px rgba(55,177,121,0)}100%{box-shadow:0 0 0 0 rgba(55,177,121,0)}}
  @keyframes axhBlink{50%{opacity:0}}
  @media (max-width:640px){
    .axhStage{height:420px !important}
    .axhTitle{display:none !important}
  }
  @media (prefers-reduced-motion: reduce){
    .axhCard,.axhCap{transition-duration:.01ms !important}
  }
</style>
</helmet>

<div style="--green:#1A5632;--accent:#37B179;--green2:#21724A;--amber:#E2A23B;--ink:#13261C;--ink2:#46554D;--line:#E6ECE8;--soft:#F6F9F7;--mint:#E7F2EB;font-family:'Pretendard',system-ui,sans-serif;color:var(--ink);background:radial-gradient(120% 120% at 80% -10%,#EEF4F0,#E9EFEC 60%);min-height:0;display:block;width:100%;padding:0;background:transparent">

  <div style="width:100%;background:transparent;border:none;border-radius:0;box-shadow:none;overflow:visible">

    <div ref="{{ stageRef }}" class="axhStage" style="position:relative;height:clamp(480px,64vh,620px);background:transparent;overflow:visible">
      <canvas ref="{{ canvasRef }}" style="position:absolute;inset:0;width:100%;height:100%;display:block"></canvas>

      <div style="position:absolute;left:16px;top:14px;z-index:5;display:none;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--green2);background:rgba(231,242,235,.85);backdrop-filter:blur(5px);padding:7px 13px;border-radius:999px;border:1px solid rgba(26,86,50,.12)">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--accent);animation:axhPls 1.4s infinite"></span>
        <span ref="{{ hudRef }}">고객 데이터 수집 중</span>
      </div>

      <div style="position:absolute;right:16px;top:14px;z-index:5;display:none;align-items:center;gap:7px;background:rgba(255,255,255,.86);backdrop-filter:blur(5px);padding:7px 12px;border-radius:11px;border:1px solid var(--line);box-shadow:0 6px 16px -12px rgba(19,45,30,.3)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 5" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span style="font-size:11px;font-weight:600;color:var(--ink2)">발송 완료</span>
        <span ref="{{ counterRef }}" style="font-size:13px;font-weight:800;color:var(--ink);letter-spacing:-.02em">0</span>
      </div>

      <div ref="{{ cardRef }}" class="axhCard" style="position:absolute;left:40px;top:40px;width:256px;z-index:6;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 22px 50px -24px rgba(19,45,30,.45),0 6px 16px -10px rgba(19,45,30,.18);padding:15px 16px;opacity:0;transform:translateY(10px) scale(.97);transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1);pointer-events:none">
        <span ref="{{ segRef }}" style="display:inline-block;font-size:11px;font-weight:800;color:var(--green2);background:var(--mint);padding:3px 10px;border-radius:999px;margin-bottom:10px">세그먼트</span>
        <div ref="{{ bodyRef }}" style="font-size:12.5px;line-height:1.6;color:var(--ink);min-height:58px"></div>
        <div style="margin-top:11px;display:flex;align-items:center;justify-content:space-between;gap:10px">
          <b ref="{{ predRef }}" style="font-size:11.5px;color:var(--green2);font-weight:800"></b>
          <span ref="{{ sendRef }}" style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;color:#fff;background:var(--green);padding:7px 13px;border-radius:9px;opacity:.45;transition:.35s ease;white-space:nowrap">발송</span>
        </div>
        <div style="margin-top:13px;padding-top:12px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:7px">
          <div style="display:flex;align-items:center;gap:8px"><span style="width:62px;flex:none;font-size:10px;font-weight:600;color:var(--ink2)">카페24 주문</span><span style="flex:1;height:5px;border-radius:3px;background:#EDF1EE;overflow:hidden"><span ref="{{ d0Ref }}" style="display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width .9s cubic-bezier(.22,1,.36,1)"></span></span></div>
          <div style="display:flex;align-items:center;gap:8px"><span style="width:62px;flex:none;font-size:10px;font-weight:600;color:var(--ink2)">행동 로그</span><span style="flex:1;height:5px;border-radius:3px;background:#EDF1EE;overflow:hidden"><span ref="{{ d1Ref }}" style="display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width .9s cubic-bezier(.22,1,.36,1) .12s"></span></span></div>
          <div style="display:flex;align-items:center;gap:8px"><span style="width:62px;flex:none;font-size:10px;font-weight:600;color:var(--ink2)">과거 캠페인</span><span style="flex:1;height:5px;border-radius:3px;background:#EDF1EE;overflow:hidden"><span ref="{{ d2Ref }}" style="display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width .9s cubic-bezier(.22,1,.36,1) .24s"></span></span></div>
        </div>
      </div>

      <div ref="{{ capRef }}" class="axhCap" style="position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:5;display:none;font-size:13px;font-weight:700;color:var(--ink);background:rgba(255,255,255,.9);backdrop-filter:blur(5px);padding:8px 17px;border-radius:999px;border:1px solid var(--line);box-shadow:0 8px 22px -14px rgba(19,45,30,.35);opacity:0;transition:opacity .5s ease;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis"></div>

      <div ref="{{ veilRef }}" style="position:absolute;inset:0;z-index:7;pointer-events:none;background:#fff;opacity:0;transition:opacity .5s ease"></div>
    </div>

    <div style="display:none">
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink2)"><span style="width:9px;height:9px;border-radius:50%;background:var(--accent)"></span>장바구니 이탈</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink2)"><span style="width:9px;height:9px;border-radius:50%;background:var(--green)"></span>재구매 임박</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink2)"><span style="width:9px;height:9px;border-radius:50%;background:var(--amber)"></span>휴면 직전</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink2)"><span style="width:9px;height:9px;border-radius:50%;background:#C2CFC7"></span>일반</span>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:640},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#37B179&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#37B179&quot;,&quot;#2FA36B&quot;,&quot;#3DC487&quot;]},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;보통&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;적게&quot;,&quot;보통&quot;,&quot;많이&quot;]},&quot;motion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  componentDidMount() { this.boot(); }
  componentWillUnmount() { this.teardown(); }

  cfg() {
    const p = this.props || {};
    const densityMap = { '적게': 150, '보통': 260, '많이': 360 };
    return {
      COUNT: densityMap[p.density] || 260,
      COLORS: { cart: p.accent || '#37B179', repeat: '#1A5632', dormant: '#E2A23B', none: '#C2CFC7' },
      SEGS: [
        { key: 'cart',    name: '장바구니 이탈 · 1,240명', count: 1240, msg: '서연님, 장바구니에 담아두신 상품 아직 고민 중이신가요? 지금 주문하시면 무료배송으로 보내드려요.', pred: '예상 전환 +3.2%', cx: 0.50, cy: 0.42, fills: [88, 74, 62] },
        { key: 'repeat',  name: '재구매 임박 · 540명',   count: 540,  msg: '민준님, 지난번 구매하신 제품 재구매 시기가 다가왔어요. 단골 고객님께만 10% 쿠폰을 준비했습니다.', pred: '예상 전환 +4.1%', cx: 0.80, cy: 0.40, fills: [92, 68, 80] },
        { key: 'dormant', name: '휴면 직전 · 320명',     count: 320,  msg: '지우님, 오랜만이에요! 다시 찾아주시는 분들께 드리는 웰컴백 혜택을 보내드려요.', pred: '예상 전환 +2.4%', cx: 0.64, cy: 0.62, fills: [70, 86, 58] }
      ],
      T_COLLECT: 2500, T_SETTLE: 4000, TYPE_MS: 26, T_SENT: 800, T_HOLD: 2800, T_GAP: 800, T_WRAP: 1000
    };
  }
  hexA(hex, a) {
    const h = hex.replace('#', '');
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }
  makeSprite(color) {
    const s = 64, cv = document.createElement('canvas'); cv.width = cv.height = s;
    const g = cv.getContext('2d');
    const grd = g.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
    grd.addColorStop(0, this.hexA(color, 0.95));
    grd.addColorStop(0.28, this.hexA(color, 0.55));
    grd.addColorStop(1, this.hexA(color, 0));
    g.fillStyle = grd; g.beginPath(); g.arc(s / 2, s / 2, s / 2, 0, 6.2832); g.fill();
    return cv;
  }
  boot() {
    if (!this.canvas || !this.stage) return;
    this.C = this.cfg();
    this.reduced = (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) || (this.props && this.props.motion === false);
    this.ctx = this.canvas.getContext('2d');
    this.sprites = {};
    for (const k in this.C.COLORS) this.sprites[k] = this.makeSprite(this.C.COLORS[k]);
    this.timers = []; this.trails = []; this.flash = {}; this.counterVal = 0; this.counterTarget = 0;
    this.phase = 0; this.segIdx = 0; this.segStart = 0;
    const tryInit = () => {
      const r = this.stage.getBoundingClientRect();
      if (!r.width || !r.height) { this._boot = requestAnimationFrame(tryInit); return; }
      this.resize(); this.init();
    };
    tryInit();
    this._onResize = () => { clearTimeout(this._rt); this._rt = setTimeout(() => { this.resize(); this.init(); }, 200); };
    window.addEventListener('resize', this._onResize);
  }
  teardown() {
    cancelAnimationFrame(this.raf); cancelAnimationFrame(this._boot);
    (this.timers || []).forEach(clearTimeout); clearTimeout(this._rt);
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }
  resize() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const r = this.stage.getBoundingClientRect();
    this.W = r.width; this.H = r.height;
    this.canvas.width = this.W * dpr; this.canvas.height = this.H * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.count = this.W < 560 ? Math.round(this.C.COUNT * 0.55) : this.C.COUNT;
  }
  rand(a, b) { return a + Math.random() * (b - a); }
  clearT() { (this.timers || []).forEach(clearTimeout); this.timers = []; }
  setHud(s) { if (this.hudEl) this.hudEl.textContent = s; }
  setCap(s) { if (this.capEl) { this.capEl.textContent = s; this.capEl.style.opacity = '1'; } }

  init() {
    this.clearT();
    const W = this.W, H = this.H;
    this.pts = [];
    for (let i = 0; i < this.count; i++) {
      const rr = Math.random();
      let key = 'none';
      if (rr < 0.16) key = 'cart'; else if (rr < 0.27) key = 'repeat'; else if (rr < 0.35) key = 'dormant';
      this.pts.push({ x: this.rand(30, W - 30), y: this.rand(30, H - 40), vx: this.reduced ? 0 : this.rand(-.3, .3), vy: this.reduced ? 0 : this.rand(-.3, .3), key, baseR: this.rand(2.0, 3.4), z: Math.random(), tgt: null });
    }
    this.phase = 0; this.segIdx = 0; this.trails = []; this.flash = {};
    this.counterVal = 0; this.counterTarget = 0;
    if (this.counterEl) this.counterEl.textContent = '0';
    this.hideCard();
    if (this.veilEl) { this.veilEl.style.opacity = '.55'; setTimeout(() => { this.veilEl.style.opacity = '0'; }, 60); }
    cancelAnimationFrame(this.raf); this.loop();
    this.schedule();
  }
  schedule() {
    this.clearT();
    this.setHud('고객 데이터 수집 중'); this.setCap('흩어진 고객 ' + this.count + '명 — 누가 살지 사람은 못 봅니다');
    this.timers.push(setTimeout(() => { this.phase = 1; this.assignClusters(); this.segStart = performance.now(); this.setHud('AXion이 세그먼트 분류 중'); this.setCap('행동·주문 신호로 자동 세그먼트화'); }, this.C.T_COLLECT));
    this.timers.push(setTimeout(() => { this.phase = 2; this.startSeg(0); }, this.C.T_COLLECT + this.C.T_SETTLE));
  }
  assignClusters() {
    const W = this.W, H = this.H;
    const centers = {}; this.C.SEGS.forEach(s => centers[s.key] = { x: s.cx * W, y: s.cy * H });
    this.pts.forEach(p => {
      if (centers[p.key]) { const c = centers[p.key]; p.tgt = { x: c.x + this.rand(-46, 46), y: c.y + this.rand(-40, 40) }; }
      else { p.tgt = { x: this.rand(28, W - 28), y: this.rand(28, H - 36) }; p.dim = true; }
    });
  }
  startSeg(i) {
    this.segIdx = i; const s = this.C.SEGS[i]; const W = this.W, H = this.H;
    this.setHud('맞춤 메시지 생성 중'); this.setCap('이 그룹에 딱 맞는 문장을 씁니다');
    const cardW = W < 560 ? 220 : 256, cardH = 200;
    let mx = s.cx <= 0.5 ? s.cx * W + 30 : s.cx * W - cardW - 30;
    let my = s.cy * H - cardH / 2;
    mx = Math.min(Math.max(mx, 10), W - cardW - 10);
    my = Math.min(Math.max(my, 10), H - cardH - 10);
    this.cardEl.style.width = cardW + 'px';
    this.cardEl.style.left = mx + 'px'; this.cardEl.style.top = my + 'px';
    this.segEl.textContent = s.name;
    this.bodyEl.innerHTML = '<span style="display:inline-block;width:1px;height:1em;vertical-align:-2px;background:var(--green);animation:axhBlink .8s steps(1) infinite"></span>';
    this.predEl.textContent = '';
    this.sendEl.style.opacity = '.45'; this.sendEl.style.background = 'var(--green)'; this.sendEl.innerHTML = '발송';
    this.d0Ref.style.width = '0'; this.d1Ref.style.width = '0'; this.d2Ref.style.width = '0';
    this.cardEl.style.opacity = '1'; this.cardEl.style.transform = 'translateY(0) scale(1)';
    this.timers.push(setTimeout(() => { this.d0Ref.style.width = s.fills[0] + '%'; this.d1Ref.style.width = s.fills[1] + '%'; this.d2Ref.style.width = s.fills[2] + '%'; }, 220));
    this.typeMsg(s.msg, () => {
      this.predEl.textContent = s.pred;
      this.timers.push(setTimeout(() => {
        this.sendEl.style.opacity = '1'; this.sendEl.style.background = 'var(--accent)'; this.sendEl.innerHTML = '✓ 발송 완료';
        this.setHud('발송 완료 · 성과 학습'); this.setCap('사람 손 없이 — AXion이 보냈습니다');
        this.fireTrail(s); this.counterTarget += s.count;
      }, this.C.T_SENT));
      this.timers.push(setTimeout(() => {
        this.hideCard();
        const nx = (i + 1) % this.C.SEGS.length;
        if (nx === 0) this.timers.push(setTimeout(() => this.init(), this.C.T_WRAP));
        else this.timers.push(setTimeout(() => this.startSeg(nx), this.C.T_GAP));
      }, this.C.T_SENT + this.C.T_HOLD));
    });
  }
  hideCard() { if (this.cardEl) { this.cardEl.style.opacity = '0'; this.cardEl.style.transform = 'translateY(10px) scale(.97)'; } }
  typeMsg(txt, done) {
    if (this.reduced) { this.bodyEl.textContent = txt; this.timers.push(setTimeout(done, 200)); return; }
    let i = 0; const self = this;
    const stepFn = () => {
      if (i <= txt.length) { self.bodyEl.innerHTML = txt.slice(0, i) + '<span style="display:inline-block;width:1px;height:1em;vertical-align:-2px;background:var(--green);animation:axhBlink .8s steps(1) infinite"></span>'; i++; self.timers.push(setTimeout(stepFn, self.C.TYPE_MS)); }
      else { self.bodyEl.textContent = txt; done && done(); }
    };
    stepFn();
  }
  fireTrail(s) {
    const W = this.W, H = this.H; const c = { x: s.cx * W, y: s.cy * H };
    const cr = this.cardEl.getBoundingClientRect(), sr = this.stage.getBoundingClientRect();
    const ox = cr.left - sr.left + cr.width / 2, oy = cr.top - sr.top + cr.height / 2;
    if (this.reduced) { this.flash[s.key] = performance.now(); return; }
    for (let k = 0; k < 16; k++) {
      const d = 0.16 + Math.random() * 0.12;
      this.trails.push({ x: ox, y: oy, ox, oy, tx: c.x + this.rand(-30, 30), ty: c.y + this.rand(-30, 30), t: 0, sp: d, col: this.C.COLORS[s.key], key: s.key, r: this.rand(1.8, 3) });
    }
  }
  loop() {
    const ctx = this.ctx, W = this.W, H = this.H, now = performance.now();
    ctx.clearRect(0, 0, W, H);

    if (this.phase === 1 && now - this.segStart < 1300) {
      const k = 1 - (now - this.segStart) / 1300;
      ctx.lineWidth = 1;
      for (const s of this.C.SEGS) {
        const cx = s.cx * W, cy = s.cy * H;
        ctx.strokeStyle = this.hexA(this.C.COLORS[s.key], 0.10 * k);
        ctx.beginPath();
        for (const p of this.pts) { if (p.key === s.key) { ctx.moveTo(p.x, p.y); ctx.lineTo(cx, cy); } }
        ctx.stroke();
      }
    }

    for (const p of this.pts) {
      if (this.phase >= 1 && p.tgt) {
        if (this.reduced) { p.x = p.tgt.x; p.y = p.tgt.y; }
        else { p.x += (p.tgt.x - p.x) * 0.032; p.y += (p.tgt.y - p.y) * 0.032; }
      } else if (!this.reduced) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 22 || p.x > W - 22) p.vx *= -1;
        if (p.y < 22 || p.y > H - 34) p.vy *= -1;
      }
      const near = 0.55 + p.z * 0.95;
      const dr = p.baseR * near;
      let alpha = (0.45 + p.z * 0.55);
      const col = this.phase >= 1 ? p.key : 'none';
      if (this.phase >= 1 && p.key === 'none') alpha *= 0.28;
      if (this.phase >= 2) { const act = this.C.SEGS[this.segIdx].key; if (p.key !== act) alpha *= (p.key === 'none' ? 0.16 : 0.4); }
      let fl = 0; const ft = this.flash[p.key];
      if (this.phase >= 2 && p.key === this.C.SEGS[this.segIdx].key && ft) { const e = (now - ft) / 600; if (e < 1) fl = (1 - e); }
      const sp = this.sprites[col];
      const ds = dr * (3.1 + fl * 1.6);
      ctx.globalAlpha = Math.min(1, alpha + fl * 0.4);
      ctx.drawImage(sp, p.x - ds / 2, p.y - ds / 2, ds, ds);
      ctx.globalAlpha = Math.min(1, alpha + fl * 0.5);
      ctx.fillStyle = this.C.COLORS[col];
      ctx.beginPath(); ctx.arc(p.x, p.y, dr * 0.62, 0, 6.2832); ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const tr of this.trails) {
      tr.t += tr.sp; const e = Math.min(1, tr.t);
      const ease = 1 - Math.pow(1 - e, 3);
      const x = tr.ox + (tr.tx - tr.ox) * ease, y = tr.oy + (tr.ty - tr.oy) * ease;
      const px = tr.ox + (tr.tx - tr.ox) * Math.max(0, ease - 0.08), py = tr.oy + (tr.ty - tr.oy) * Math.max(0, ease - 0.08);
      ctx.strokeStyle = this.hexA(tr.col, 0.5 * (1 - e)); ctx.lineWidth = tr.r; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();
      const sp = this.sprites[tr.key]; const ds = tr.r * 5;
      ctx.globalAlpha = 0.8 * (1 - e * 0.5);
      ctx.drawImage(sp, x - ds / 2, y - ds / 2, ds, ds); ctx.globalAlpha = 1;
      if (e >= 1 && !tr._done) { tr._done = true; this.flash[tr.key] = performance.now(); }
    }
    this.trails = this.trails.filter(t => t.t < 1.05);

    if (this.counterEl) {
      this.counterVal += (this.counterTarget - this.counterVal) * 0.08;
      if (Math.abs(this.counterTarget - this.counterVal) < 1) this.counterVal = this.counterTarget;
      this.counterEl.textContent = Math.round(this.counterVal).toLocaleString();
    }
    this.raf = requestAnimationFrame(() => this.loop());
  }
  restart() { this.clearT(); this.init(); }

  renderVals() {
    return {
      stageRef: (el) => { this.stage = el; },
      canvasRef: (el) => { this.canvas = el; },
      hudRef: (el) => { this.hudEl = el; },
      capRef: (el) => { this.capEl = el; },
      cardRef: (el) => { this.cardEl = el; },
      segRef: (el) => { this.segEl = el; },
      bodyRef: (el) => { this.bodyEl = el; },
      predRef: (el) => { this.predEl = el; },
      sendRef: (el) => { this.sendEl = el; },
      d0Ref: (el) => { this.d0Ref = el; },
      d1Ref: (el) => { this.d1Ref = el; },
      d2Ref: (el) => { this.d2Ref = el; },
      counterRef: (el) => { this.counterEl = el; },
      veilRef: (el) => { this.veilEl = el; },
      replay: () => this.restart()
    };
  }
}
